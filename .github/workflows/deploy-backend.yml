# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy API and update database

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: App Settings Variable Substitution
        uses: microsoft/variable-substitution@v1
        with:
          files: 'backend/Api/appsettings.json'
        env:
          ConnectionStrings.DatabaseContext: ${{ secrets.DB_CONNECTION_STRING }}
          IcuConfig.ApiKey: ${{ secrets.ICU_API_KEY }}
          AuthConfig.JwtSecretKey: ${{ secrets.JWT_SECRET_KEY }}
          ImgBB.ApiKey: ${{ secrets.IMGBB_API_KEY }}
          EmailConfig.SmtpPassword: ${{ secrets.EMAIL_SMTP_PASSWORD }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build backend/Api/Api.csproj --configuration Release

      - name: Restore tools
        run: dotnet tool restore

      - name: Update Database
        run: |
          dotnet ef database update \
            --project backend/EntityFramework/EntityFramework.csproj \
            --startup-project backend/Api/Api.csproj

      - name: dotnet publish
        run: dotnet publish backend/Api/Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'icmc-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_21828A78B4364228909FBE486A7EA767 }}
